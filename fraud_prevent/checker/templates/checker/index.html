<!DOCTYPE html>
<html>
<head>
    <title>사기 방지 플랫폼 - Checker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .search-box { margin-bottom: 20px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🛡️ 사기 피해 방지 조회</h1>
    <p>상대방의 계좌번호나 전화번호를 입력하여 피해 사례를 확인하세요.</p>

    <div class="search-box">
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="query" placeholder="번호 또는 계좌 입력...">
            <button type="submit">조회하기</button>
        </form>
    </div>

{% if search_result == "no_result" %}
    <p style="color: blue;">조회된 피해 사례가 없습니다. 안심하셔도 좋습니다.</p>
{% elif search_result %}
    <p style="color: red; font-weight: bold;">⚠️ 주의! 피해 사례가 존재합니다.</p>
    
<h3>사기 피해 사례 제보하기</h3>
<form method="post">
    {% csrf_token %}
    <input type="text" name="fraud_type" placeholder="사기 유형 (예: 중고거래)" required><br>
    <input type="text" name="fraud_info" placeholder="연락처 또는 계좌번호" required><br>
    <textarea name="description" placeholder="상세 피해 내용" required></textarea><br>
    <button type="submit">등록 요청하기</button>
</form>
</body>
</html>
