{% if message %}
    <script>alert("{{ message }}");</script>
{% endif %}

<div class="container">
    <h1>🛡️ 사기 피해 방지 플랫폼</h1>
    
    <div class="section">
        <h3>🔍 피해 사례 조회</h3>
        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="action_type" value="search">
            <input type="text" name="search_query" value="{{ query|default:'' }}" placeholder="조회할 번호/계좌 입력...">
            <button type="submit">조회하기</button>
        </form>
        </div>

    <hr>

    <div class="section" style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px;">
        <h3>🚨 피해 사례 제보하기</h3>
        <p style="font-size: 0.9em; color: #666;">허위 제보 방지를 위해 관리자 승인 후 등록됩니다.</p>
        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="action_type" value="report">
            <input type="text" name="fraud_info" placeholder="사기꾼 번호 또는 계좌" required><br>
            <select name="fraud_type" style="padding: 10px; width: 75%; margin-bottom: 10px;">
                <option value="중고거래">중고거래 사기</option>
                <option value="보이스피싱">보이스피싱</option>
                <option value="기타">기타</option>
            </select><br>
            <textarea name="description" placeholder="상세 피해 내용 (선택사항)" style="width: 70%; height: 80px; padding: 10px;"></textarea><br>
            <button type="submit" style="background-color: #28a745;">제보 등록</button>
        </form>
    </div>
</div>
